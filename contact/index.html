  </nav>

  <header class="page-header">
    <span class="eyebrow">Say hi</span>
    <h1 class="page-title">Contact</h1>
    <p class="page-sub">Reach out about research, projects, or anything at the medicine/tech overlap — I read everything that comes through.</p>
  </header>

  <div class="contact-grid">
    <div>
      <div class="contact-card">
        <iframe
          src="https://www.google.com/maps?q=Piazza+Cavour,+Ancona,+Italy&output=embed"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          title="Ancona, Italy map"
        ></iframe>
      </div>
      <div class="socials-row">
        <a class="social-pill" href="mailto:ares.kamalsingh@gmail.com">Email</a>
        <a class="social-pill" href="https://github.com/Walexrius" target="_blank" rel="noopener">GitHub</a>
        <a class="social-pill" href="https://www.linkedin.com/in/kamal-rajkumar-singh-walexrius" target="_blank" rel="noopener">LinkedIn</a>
        <a class="social-pill" href="https://www.instagram.com/kamal_siiingh/" target="_blank" rel="noopener">Instagram</a>
        <a class="social-pill" href="https://x.com/Walexrius" target="_blank" rel="noopener">X</a>
        <a class="social-pill" href="https://www.threads.net/letstalk_kamalsingh" target="_blank" rel="noopener">Threads</a>
      </div>
    </div>

    <form action="https://formsubmit.co/ares.kamalsingh@gmail.com" method="POST" class="form">
      <div class="input-row">
        <input type="text" name="name" class="form-input" placeholder="Full name" required />
        <input type="email" name="email" class="form-input" placeholder="Email address" required />
      </div>
      <textarea name="message" class="form-input" placeholder="Your message" required></textarea>
      <button class="btn btn-primary" type="submit">Send message</button>
    </form>
  </div>

  <footer class="site-footer">
    <span class="foot-copy">© 2026 Kamal Rajkumar Singh</span>

      <a href="https://www.instagram.com/kamal_siiingh/" target="_blank" rel="noopener">Instagram</a>
    </div>
  </footer>

  <script src="../assets/js/script.js"></script>
